app = "chatbotwa"
primary_region = sin   # Singapore — closest to Jakarta

[build]
  dockerfile = "docker.dockerfile"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[env]
  PORT = "5000"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1